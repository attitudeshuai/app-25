services:
  app:
    build: .
    container_name: trippacking_app
    ports:
      - "8095:8095"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=trippacking
      - DB_USER=app_user
      - DB_PASSWORD=app_pass
      - JWT_SECRET=TripPackingSuperSecretKeyForJWTTokenGeneration2024Docker
      - JWT_ISSUER=TripPacking
      - JWT_AUDIENCE=TripPackingUsers
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: trippacking_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=trippacking
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_pass
    ports:
      - "13320:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_pass || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

volumes:
  mysql_data:
